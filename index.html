<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Profile Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root { --navy: #2b3d4d; --teal: #87d0c5; --slate: #4e6376; --light: #d0ecef; --white: #ffffff; --border: #dde4e8; --error: #c0392b; --success: #27ae60; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f4f6; color: var(--navy); min-height: 100vh; }
  header { background: var(--navy); padding: 16px 40px; display: flex; align-items: center; border-bottom: 3px solid var(--teal); }
  header img { height: 40px; }
  header span { color: var(--teal); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; }
  .container { max-width: 820px; margin: 40px auto; padding: 0 24px 60px; }
  .card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 16px rgba(43,61,77,0.07); margin-bottom: 16px; }
  .card-header { background: var(--light); padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .card-header .step { background: var(--navy); color: var(--white); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
  .card-header h2 { font-size: 0.95rem; font-weight: 600; color: var(--navy); }
  .card-body { padding: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.78rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.06em; }
  textarea { border: 1.5px solid var(--border); border-radius: 7px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--navy); background: #fafcfd; outline: none; width: 100%; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--teal); background: var(--white); }
  .upload-zone { border: 2px dashed var(--teal); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f7fdfc; }
  .upload-zone:hover, .upload-zone.drag-over { background: var(--light); border-color: var(--navy); }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 10px; }
  .upload-zone p { font-size: 0.88rem; color: var(--slate); line-height: 1.5; }
  .upload-zone strong { color: var(--navy); }
  .file-name { margin-top: 10px; font-size: 0.82rem; color: var(--success); font-weight: 600; }
  #resumeInput { display: none; }
  .hint { font-size: 0.78rem; color: var(--slate); margin-top: 4px; font-style: italic; }
  .btn-generate { width: 100%; padding: 16px; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-generate:hover:not(:disabled) { background: var(--slate); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
  .status-bar { display: none; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 8px; margin-top: 16px; font-size: 0.88rem; font-weight: 500; }
  .status-bar.loading { display: flex; background: var(--light); color: var(--navy); }
  .status-bar.error { display: flex; background: #fdecea; color: var(--error); }
  .spinner { width: 18px; height: 18px; border: 2.5px solid var(--teal); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #previewSection { display: none; margin-top: 28px; }
  .preview-actions { display: flex; gap: 12px; margin-bottom: 16px; }
  .btn-download { flex: 1; padding: 13px; background: var(--teal); color: var(--navy); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-download:hover { background: #6bbfb3; }
  .btn-reset { padding: 13px 20px; background: transparent; color: var(--slate); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-reset:hover { border-color: var(--slate); color: var(--navy); }
  #profilePreview { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 20px rgba(43,61,77,0.1); }

  /* PROFILE DOC */
  .profile-doc { font-family: 'DM Sans', sans-serif; color: var(--navy); }
  .profile-page { padding: 32px 40px; }
  .logo-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--light); }
  .logo-bar img { height: 32px; width: 32px; }
  .logo-bar-text { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate); }
  .candidate-name { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--navy); font-weight: 400; margin-bottom: 3px; }
  .candidate-meta { font-size: 0.85rem; color: var(--slate); margin-bottom: 2px; }
  .section { margin-top: 18px; }
  .section-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1.5px solid var(--light); }
  .section-content { font-size: 0.85rem; line-height: 1.6; color: #3a4d5c; }
  .section-content ul { padding-left: 16px; margin-top: 3px; }
  .section-content li { margin-bottom: 3px; }
  .exp-entry { margin-bottom: 14px; }
  .exp-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .exp-company { font-style: italic; font-size: 0.8rem; color: var(--slate); }
  .exp-date { font-size: 0.76rem; color: var(--slate); white-space: nowrap; }
  .exp-title { font-weight: 700; font-size: 0.88rem; margin: 2px 0 5px; }
  .full-skills-block { font-size: 0.83rem; line-height: 1.65; color: #3a4d5c; }
  .edu-line { font-style: italic; font-size: 0.85rem; color: var(--slate); }
  .page-divider-label { text-align: center; padding: 12px; background: var(--navy); color: var(--teal); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
</style>
</head>

let resumeFile = null;
let profileData = null;

const uploadZone = document.getElementById('uploadZone');
const resumeInput = document.getElementById('resumeInput');
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') handleFile(file);
  else alert('Please upload a PDF file.');
});
resumeInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  resumeFile = file;
  document.getElementById('fileName').textContent = '\u2713 ' + file.name;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusMsg').textContent = msg;
}

async function generateProfile() {
  if (!resumeFile) { alert('Please upload a resume PDF first.'); return; }
  const positioning = document.getElementById('positioning').value.trim();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('btnText').textContent = 'Generating...';
  setStatus('loading', 'Reading resume and extracting candidate information...');
  document.getElementById('previewSection').style.display = 'none';
  try {
    const pdfBase64 = await fileToBase64(resumeFile);
    setStatus('loading', 'Analyzing resume with AI...');
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pdfBase64, positioning })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Server error ' + response.status);
    }
    profileData = await response.json();
    renderProfile(profileData);
    document.getElementById('statusBar').style.display = 'none';
    document.getElementById('previewSection').style.display = 'block';
  } catch (err) {
    console.error(err);
    setStatus('error', 'Error: ' + err.message);
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'Generate Profile';
  }
}

function renderProfile(d) {
  const topExpHtml = (d.topExperience || []).map(e => `
    <div class="exp-entry">
      <div class="exp-header"><span class="exp-company">${e.company}</span><span class="exp-date">${e.dates}</span></div>
      <div class="exp-title">${e.title}</div>
      <ul>${(e.bullets||[]).map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  const fullExpHtml = (d.fullExperience || []).map(e => `
    <div class="exp-entry">
      <div class="exp-header"><span class="exp-company">${e.company}</span><span class="exp-date">${e.dates}</span></div>
      <div class="exp-title">${e.title}</div>
      <ul>${(e.bullets||[]).map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  document.getElementById('profilePreview').innerHTML = `
    <div class="profile-doc" id="profileDoc">
      <div class="profile-page">
        <div class="logo-bar">
          <img src="data:image/png;base64,${LOGO_ICON}" alt="Loop Consulting" />
          <span class="logo-bar-text">Loop Consulting</span>
        </div>
        <div class="candidate-name">${d.name}</div>
        <div class="candidate-meta">${d.location}</div>
        <div class="candidate-meta">${d.jobTitle}</div>
        <div class="section">
          <div class="section-title">Summary</div>
          <div class="section-content"><ul>${(d.summary||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
        </div>
        <div class="section">
          <div class="section-title">Key Skills</div>
          <div class="section-content"><ul>${(d.topSkills||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
        </div>
        <div class="section">
          <div class="section-title">Recent Experience</div>
          <div class="section-content">${topExpHtml}</div>
        </div>
      </div>

      <div class="page-divider-label">Full Technical Detail</div>

      <div class="profile-page">
        <div class="logo-bar">
          <img src="data:image/png;base64,${LOGO_ICON}" alt="Loop Consulting" />
          <span class="logo-bar-text">Loop Consulting</span>
        </div>
        <div class="candidate-name">${d.name}</div>
        <div class="candidate-meta">${d.jobTitle}</div>
        <div class="section">
          <div class="section-title">Complete Skills &amp; Certifications</div>
          <div class="section-content"><div class="full-skills-block">${d.fullSkills || ''}</div></div>
        </div>
        <div class="section">
          <div class="section-title">Full Experience</div>
          <div class="section-content">${fullExpHtml}</div>
        </div>
        <div class="section">
          <div class="section-title">Education</div>
          <div class="section-content edu-line">${d.education}</div>
        </div>
      </div>
    </div>`;
}

function downloadPDF() {
  if (!profileData) return;
  const name = (profileData.name || 'Candidate').replace(/\s+/g, '_');
  const element = document.getElementById('profileDoc');
  const opt = {
    margin: [15, 15, 15, 15],
    filename: name + '_Loop_Profile.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { before: '.page-divider-label' }
  };
  html2pdf().set(opt).from(element).save();
}

function resetForm() {
  resumeFile = null;
  profileData = null;
  document.getElementById('fileName').textContent = '';
  document.getElementById('positioning').value = '';
  document.getElementById('resumeInput').value = '';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('statusBar').className = 'status-bar';
}
</script>
</body>
</html>
