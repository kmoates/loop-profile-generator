<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Profile Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<style>
  :root { --navy: #2b3d4d; --teal: #87d0c5; --slate: #4e6376; --light: #d0ecef; --white: #ffffff; --border: #dde4e8; --error: #c0392b; --success: #27ae60; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f4f6; color: var(--navy); min-height: 100vh; }
  header { background: var(--navy); padding: 16px 40px; display: flex; align-items: center; border-bottom: 3px solid var(--teal); }
  .header-logo { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 1.3rem; font-weight: 400; letter-spacing: 0.04em; }
  header .tag { color: var(--teal); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-left: auto; }
  .container { max-width: 820px; margin: 40px auto; padding: 0 24px 60px; }
  .card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 16px rgba(43,61,77,0.07); margin-bottom: 16px; }
  .card-header { background: var(--light); padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .card-header .step { background: var(--navy); color: var(--white); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
  .card-header h2 { font-size: 0.95rem; font-weight: 600; color: var(--navy); }
  .card-body { padding: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.78rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.06em; }
  textarea { border: 1.5px solid var(--border); border-radius: 7px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--navy); background: #fafcfd; outline: none; width: 100%; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--teal); background: var(--white); }
  .upload-zone { border: 2px dashed var(--teal); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f7fdfc; }
  .upload-zone:hover, .upload-zone.drag-over { background: var(--light); border-color: var(--navy); }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 10px; }
  .upload-zone p { font-size: 0.88rem; color: var(--slate); line-height: 1.5; }
  .upload-zone strong { color: var(--navy); }
  .file-name { margin-top: 10px; font-size: 0.82rem; color: var(--success); font-weight: 600; }
  #resumeInput { display: none; }
  .hint { font-size: 0.78rem; color: var(--slate); margin-top: 4px; font-style: italic; }
  .btn-generate { width: 100%; padding: 16px; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-generate:hover:not(:disabled) { background: var(--slate); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
  .status-bar { display: none; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 8px; margin-top: 16px; font-size: 0.88rem; font-weight: 500; }
  .status-bar.loading { display: flex; background: var(--light); color: var(--navy); }
  .status-bar.error { display: flex; background: #fdecea; color: var(--error); }
  .spinner { width: 18px; height: 18px; border: 2.5px solid var(--teal); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #previewSection { display: none; margin-top: 28px; }
  .preview-actions { display: flex; gap: 12px; margin-bottom: 16px; }
  .btn-download { flex: 1; padding: 13px; background: var(--teal); color: var(--navy); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-download:hover { background: #6bbfb3; }
  .btn-download:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-reset { padding: 13px 20px; background: transparent; color: var(--slate); border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-reset:hover { border-color: var(--slate); color: var(--navy); }
  #profilePreview { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 20px rgba(43,61,77,0.1); padding: 36px 44px; font-size: 0.88rem; line-height: 1.6; color: #3a4d5c; }
  .prev-logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 16px; padding-bottom: 14px; border-bottom: 2px solid var(--light); }
  .prev-name { font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: var(--navy); font-weight: 400; margin-bottom: 2px; }
  .prev-meta { font-size: 0.82rem; color: var(--slate); margin-bottom: 2px; }
  .prev-section { margin-top: 16px; }
  .prev-section-title { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1.5px solid var(--light); }
  .prev-section ul { padding-left: 16px; }
  .prev-section li { margin-bottom: 2px; }
  .prev-exp { margin-bottom: 12px; }
  .prev-exp-header { display: flex; justify-content: space-between; }
  .prev-exp-company { font-style: italic; font-size: 0.78rem; color: var(--slate); }
  .prev-exp-date { font-size: 0.74rem; color: var(--slate); }
  .prev-exp-title { font-weight: 700; font-size: 0.85rem; margin: 2px 0 4px; }
  .prev-divider { margin: 20px 0; padding: 8px; background: var(--navy); color: var(--teal); text-align: center; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-logo">Loop Consulting.</div>
  <span class="tag">Candidate Profile Generator</span>
</header>

<div class="container">
  <div class="card">
    <div class="card-header"><div class="step">1</div><h2>Upload Resume</h2></div>
    <div class="card-body">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('resumeInput').click()">
        <div class="icon">📄</div>
        <p><strong>Click to upload</strong> or drag and drop<br>PDF resume only</p>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" id="resumeInput" accept=".pdf" />
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="step">2</div><h2>Placement Details</h2></div>
    <div class="card-body">
      <div class="field">
        <label>Client-Specific Positioning <span style="color:var(--slate);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="positioning" placeholder="e.g. Positioned for Nexpring Health's SAP B1 modernization initiative — strong fit for their need to consolidate financial reporting across business units."></textarea>
        <div class="hint">Leave blank to let Claude generate a general summary from the resume.</div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generateProfile()">
    <span id="btnText">Generate Profile</span>
  </button>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusMsg">Reading resume and generating profile...</span>
  </div>

  <div id="previewSection">
    <div style="height:24px"></div>
    <div class="preview-actions">
      <button class="btn-download" id="downloadBtn" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="btn-reset" onclick="resetForm()">Start Over</button>
    </div>
    <div id="profilePreview"></div>
  </div>
</div>

<script>
let resumeFile = null;
let profileData = null;

const NAVY  = '#2b3d4d';
const TEAL  = '#87d0c5';
const SLATE = '#4e6376';
const LIGHT = '#d0ecef';
const BODY  = '#3a4d5c';

const uploadZone = document.getElementById('uploadZone');
const resumeInput = document.getElementById('resumeInput');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') handleFile(file);
  else alert('Please upload a PDF file.');
});
resumeInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  resumeFile = file;
  document.getElementById('fileName').textContent = '\u2713 ' + file.name;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusMsg').textContent = msg;
}

async function generateProfile() {
  if (!resumeFile) { alert('Please upload a resume PDF first.'); return; }
  const positioning = document.getElementById('positioning').value.trim();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('btnText').textContent = 'Generating...';
  setStatus('loading', 'Reading resume and extracting candidate information...');
  document.getElementById('previewSection').style.display = 'none';
  try {
    const pdfBase64 = await fileToBase64(resumeFile);
    setStatus('loading', 'Analyzing resume with AI...');
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pdfBase64, positioning })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Server error ' + response.status);
    }
    profileData = await response.json();
    renderPreview(profileData);
    document.getElementById('statusBar').style.display = 'none';
    document.getElementById('previewSection').style.display = 'block';
  } catch (err) {
    console.error(err);
    setStatus('error', 'Error: ' + err.message);
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'Generate Profile';
  }
}

function renderPreview(d) {
  const expHtml = arr => (arr || []).map(e => `
    <div class="prev-exp">
      <div class="prev-exp-header">
        <span class="prev-exp-company">${e.company}</span>
        <span class="prev-exp-date">${e.dates}</span>
      </div>
      <div class="prev-exp-title">${e.title}</div>
      <ul>${(e.bullets||[]).map(b => `<li>${b}</li>`).join('')}</ul>
    </div>`).join('');

  document.getElementById('profilePreview').innerHTML = `
    <div class="prev-logo">Loop Consulting.</div>
    <div class="prev-name">${d.name}</div>
    ${d.location ? `<div class="prev-meta">${d.location}</div>` : ''}
    <div class="prev-meta">${d.jobTitle}</div>
    <div class="prev-section">
      <div class="prev-section-title">Summary</div>
      <ul>${(d.summary||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="prev-section">
      <div class="prev-section-title">Key Skills</div>
      <ul>${(d.topSkills||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="prev-section">
      <div class="prev-section-title">Recent Experience</div>
      ${expHtml(d.topExperience)}
    </div>
    <div class="prev-divider">Full Technical Detail</div>
    <div class="prev-section">
      <div class="prev-section-title">Complete Skills &amp; Certifications</div>
      <p>${d.fullSkills || ''}</p>
    </div>
    <div class="prev-section">
      <div class="prev-section-title">Full Experience</div>
      ${expHtml(d.fullExperience)}
    </div>
    <div class="prev-section">
      <div class="prev-section-title">Education</div>
      <p><em>${d.education}</em></p>
    </div>`;
}

// ── pdfmake helpers ──────────────────────────────────────────────────────────

function rule() {
  return { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 0.75, lineColor: LIGHT }] };
}

function sectionTitle(text) {
  return {
    stack: [
      { text: text.toUpperCase(), fontSize: 7, bold: true, color: TEAL, characterSpacing: 1.2, margin: [0, 12, 0, 3] },
      rule()
    ]
  };
}

function expBlock(entries) {
  return (entries || []).map(e => ({
    stack: [
      {
        columns: [
          { text: e.company, italics: true, fontSize: 8.5, color: SLATE, width: '*' },
          { text: e.dates, fontSize: 8, color: SLATE, alignment: 'right', width: 'auto' }
        ],
        margin: [0, 9, 0, 1]
      },
      { text: e.title, bold: true, fontSize: 9.5, color: NAVY, margin: [0, 0, 0, 3] },
      {
        ul: (e.bullets || []).map(b => ({ text: b, fontSize: 9, color: BODY, lineHeight: 1.45 })),
        margin: [0, 0, 0, 0]
      }
    ]
  }));
}

function footer() {
  return {
    stack: [
      { ...rule(), margin: [0, 14, 0, 5] },
      { text: 'loopconsulting.com', fontSize: 7.5, color: SLATE, alignment: 'center', characterSpacing: 0.8 }
    ]
  };
}

function dividerBar() {
  return {
    table: {
      widths: ['*'],
      body: [[{
        text: 'FULL TECHNICAL DETAIL',
        fontSize: 8, bold: true, color: TEAL,
        alignment: 'center', characterSpacing: 1.5,
        fillColor: NAVY,
        margin: [0, 7, 0, 7],
        border: [false, false, false, false]
      }]]
    },
    layout: 'noBorders',
    margin: [0, 0, 0, 14]
  };
}

function downloadPDF() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = 'Building PDF...';

  try {
    const d = profileData;

    const docDef = {
      pageSize: 'LETTER',
      pageMargins: [40, 40, 40, 48],
      defaultStyle: { font: 'Roboto', fontSize: 9.5, color: NAVY, lineHeight: 1.4 },

      footer: function() {
        return {
          stack: [
            { canvas: [{ type: 'line', x1: 40, y1: 0, x2: 572, y2: 0, lineWidth: 0.5, lineColor: LIGHT }] },
            { text: 'loopconsulting.com', fontSize: 7.5, color: SLATE, alignment: 'center', characterSpacing: 0.8, margin: [0, 5, 0, 0] }
          ]
        };
      },

      content: [

        // ── PAGE 1 ──────────────────────────────────────────────────────────
        { text: 'Loop Consulting.', fontSize: 13, color: NAVY, margin: [0, 0, 0, 10] },
        { ...rule(), margin: [0, 0, 0, 12] },
        { text: d.name, fontSize: 24, bold: true, color: NAVY, margin: [0, 0, 0, 3] },
        d.location ? { text: d.location, fontSize: 9, color: SLATE, margin: [0, 0, 0, 2] } : { text: '' },
        { text: d.jobTitle, fontSize: 9, color: SLATE, margin: [0, 0, 0, 0] },

        sectionTitle('Summary'),
        { ul: (d.summary||[]).map(s => ({ text: s, fontSize: 9, color: BODY, lineHeight: 1.45 })), margin: [0, 5, 0, 0] },

        sectionTitle('Key Skills'),
        { ul: (d.topSkills||[]).map(s => ({ text: s, fontSize: 9, color: BODY })), margin: [0, 5, 0, 0] },

        sectionTitle('Recent Experience'),
        ...expBlock(d.topExperience),

        // ── PAGE 2+ ─────────────────────────────────────────────────────────
        { text: '', pageBreak: 'before' },
        dividerBar(),
        { text: 'Loop Consulting.', fontSize: 13, color: NAVY, margin: [0, 0, 0, 10] },
        { ...rule(), margin: [0, 0, 0, 10] },
        { text: d.name, fontSize: 22, bold: true, color: NAVY, margin: [0, 0, 0, 2] },
        { text: d.jobTitle, fontSize: 9, color: SLATE, margin: [0, 0, 0, 0] },

        sectionTitle('Complete Skills & Certifications'),
        { text: d.fullSkills || '', fontSize: 9, color: BODY, lineHeight: 1.5, margin: [0, 5, 0, 0] },

        sectionTitle('Full Experience'),
        ...expBlock(d.fullExperience),

        sectionTitle('Education'),
        { text: d.education || '', fontSize: 9, italics: true, color: SLATE, margin: [0, 5, 0, 0] }
      ]
    };

    const candidateName = (d.name || 'Profile').replace(/\s+/g, '_');
    pdfMake.createPdf(docDef).download(`Loop_${candidateName}_Profile.pdf`);

  } catch (err) {
    console.error(err);
    alert('PDF generation failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ Download PDF';
  }
}

function resetForm() {
  resumeFile = null;
  profileData = null;
  document.getElementById('fileName').textContent = '';
  document.getElementById('positioning').value = '';
  document.getElementById('resumeInput').value = '';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('statusBar').className = 'status-bar';
}
</script>
</body>
</html>
